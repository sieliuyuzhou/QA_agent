version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: qa_agent_pgsql
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: agent
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d agent"]
      interval: 5s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend_new
      dockerfile: Dockerfile.frontend
    container_name: qa_agent_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend_new/src:/app/src
    environment:
      - VITE_API_TARGET=http://host.docker.internal:8000
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
